{% extends 'base.html' %}


{% block link%}
<link rel="stylesheet"  type= "text/css" href="/static/css/create.css?v=0.0.244">
{% endblock link%}

{% block title%}
<title>Meetgather - Create events</title>
{% endblock title%}



{% block content%}
<form enctype=multipart/form-data>
<div class="title">活動圖示</div>
<div class="enter">
    <div class="activity_photo">
        <div class="photo"><img src="/static/img/upload.svg"/></div>
    </div>
    <span class="notice">請選擇一張照片</span> <input type="file"  id='file' name="picture"  accept="image/*"/><input type='submit' value="送出" id='send'/>
</div>

<div class="title">活動標題</div>
<div class="enter">
    <input type="text" placeholder="請填寫活動名稱" id='gathername'/>
    <div class="notice">活動標題不可為空</div>
</div>

<div class="title">活動描述</div>
<div class="enter">
    <textarea id="story" name="story" placeholder="請描述活動內容"></textarea>
    <div class="notice">活動描述不可為空</div>
</div>

<div class="title">活動地點</div>
<div class="enter">
    <select name="city" class="city" >
        <option value="">--選擇地點--</option>
        <option value="online">線上</option>
        <option value="0">基隆市</option>
        <option value="1">臺北市</option>
        <option value="2">新北市</option>
        <option value="3">桃園市</option>
        <option value="4">新竹市</option>
        <option value="5">新竹縣</option>
        <option value="6">苗栗縣</option>
        <option value="7">臺中市</option>
        <option value="8">彰化縣</option>
        <option value="9">南投縣</option>
        <option value="10">雲林縣</option>
        <option value="11">嘉義市</option>
        <option value="12">嘉義縣</option>
        <option value="13">臺南市</option>
        <option value="14">高雄市</option>
        <option value="15">屏東縣</option>
        <option value="16">宜蘭縣</option>
        <option value="17">花蓮縣</option>
        <option value="18">臺東縣</option>
        <option value="19">澎湖縣</option>
        <option value="20">金門縣</option>
        <option value="21">連江縣</option>
    </select>
    <div class="notice">活動地點不可為空</div>
</div>


</form>
{% endblock content%}



{% block script %}
<script type="text/javascript" src="/static/js/create.js"></script>
{% endblock  script%}
</body>
</html>
